<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyline — Live Weather Station</title>
<style>
  :root{
    --sky-deep:#0c1320;
    --sky-mid:#16243a;
    --sky-panel:#1b2c47;
    --amber:#ffb454;
    --mist:#c9d4e3;
    --mist-dim:#7e8ea8;
    --line:#2b3c5c;
    --warn:#ff8a65;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(900px 500px at 85% -10%, #213357 0%, transparent 60%),
      radial-gradient(700px 400px at -5% 10%, #1a2742 0%, transparent 55%),
      var(--sky-deep);
    color:var(--mist);
    font-family:-apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height:100vh;
    padding:48px 24px 80px;
  }
  .mono{ font-family:"Courier New", monospace; }
  .wrap{ max-width:920px; margin:0 auto; }

  header{ display:flex; justify-content:space-between; align-items:flex-end; gap:24px; margin-bottom:36px; flex-wrap:wrap; }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-mark{ width:34px; height:34px; border-radius:50%; border:1.5px solid var(--amber); position:relative; flex-shrink:0; }
  .brand-mark::before{ content:""; position:absolute; inset:7px; border-radius:50%; background:var(--amber); box-shadow:0 0 14px 2px rgba(255,180,84,0.6); }
  .brand-name{ font-weight:700; font-size:20px; letter-spacing:0.5px; }
  .brand-sub{ font-size:11px; color:var(--mist-dim); letter-spacing:1.5px; text-transform:uppercase; margin-top:2px;}
  .clock{ text-align:right; color:var(--mist-dim); font-size:12px; letter-spacing:1px; }
  .clock span{ display:block; color:var(--amber); font-size:18px; font-weight:600; margin-top:2px; }

  .search-row{ display:flex; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
  .search-row input{
    flex:1; min-width:200px;
    background:var(--sky-panel); border:1px solid var(--line); color:var(--mist);
    padding:14px 16px; font-size:14px; border-radius:8px; outline:none;
  }
  .search-row input:focus{ border-color:var(--amber); }
  .search-row button{
    background:var(--amber); color:#1a1206; border:none; padding:0 22px;
    font-weight:600; font-size:14px; border-radius:8px; cursor:pointer;
  }
  .geo-btn{ background:transparent !important; color:var(--mist-dim) !important; border:1px solid var(--line) !important; font-weight:400 !important; font-size:12px !important; }
  .status-line{ font-size:12px; color:var(--mist-dim); min-height:18px; margin-bottom:28px; }
  .status-line.error{ color:var(--warn); }

  .hero{
    background:linear-gradient(160deg, var(--sky-panel), var(--sky-mid));
    border:1px solid var(--line); border-radius:18px; padding:36px;
    display:grid; grid-template-columns:1fr auto; gap:24px; align-items:center;
    margin-bottom:28px;
  }
  .hero-loc{ font-size:13px; color:var(--mist-dim); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
  .hero-temp{ font-size:84px; font-weight:700; line-height:1; letter-spacing:-2px; }
  .hero-temp sup{ font-size:34px; font-weight:500; color:var(--amber); top:-0.5em; position:relative;}
  .hero-desc{ font-size:17px; margin-top:8px; }
  .hero-meta{ display:flex; gap:18px; margin-top:18px; flex-wrap:wrap; }
  .hero-meta div{ font-size:12px; color:var(--mist-dim); }
  .hero-meta div b{ display:block; color:var(--mist); font-size:15px; font-weight:600; margin-top:2px;}
  .hero-icon{ font-size:96px; line-height:1; text-align:center; }

  .section-label{ font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--mist-dim); margin:32px 0 14px 4px; display:flex; align-items:center; gap:10px; }
  .section-label::after{ content:""; flex:1; height:1px; background:var(--line); }

  .hourly-strip{ display:flex; gap:10px; overflow-x:auto; padding-bottom:10px; }
  .hour-card{ flex:0 0 76px; background:var(--sky-panel); border:1px solid var(--line); border-radius:12px; padding:14px 8px; text-align:center; }
  .hour-card .t{ font-size:11px; color:var(--mist-dim); }
  .hour-card .ic{ font-size:24px; margin:8px 0; }
  .hour-card .v{ font-weight:600; font-size:15px; }

  .daily-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(130px,1fr)); gap:10px; }
  .day-card{ background:var(--sky-panel); border:1px solid var(--line); border-radius:12px; padding:18px 14px; text-align:center; }
  .day-card .d{ font-size:11px; color:var(--amber); letter-spacing:1px; text-transform:uppercase; }
  .day-card .ic{ font-size:30px; margin:10px 0; }
  .day-card .hi{ font-weight:700; font-size:18px; }
  .day-card .lo{ color:var(--mist-dim); font-size:13px; margin-left:4px; }
  .day-card .rain{ font-size:11px; color:var(--mist-dim); margin-top:8px; }

  footer{ text-align:center; margin-top:48px; font-size:11px; color:var(--mist-dim); }
  footer a{ color:var(--amber); text-decoration:none; }

  @media (max-width:560px){
    .hero{ grid-template-columns:1fr; text-align:left; }
    .hero-icon{ display:none; }
    .hero-temp{ font-size:64px; }
    body{ padding:32px 16px 60px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <div class="brand-name">Skyline</div>
        <div class="brand-sub">Live Forecast Station</div>
      </div>
    </div>
    <div class="clock mono">
      <div id="date-line">—</div>
      <span id="time-line">--:--:--</span>
    </div>
  </header>

  <div class="search-row">
    <input type="text" id="city-input" aria-label="City name" placeholder="Search a city — e.g. Jammu, Tokyo, New York..." autocomplete="off">
    <button id="search-btn" title="Search for city">Search</button>
    <button id="geo-btn" class="geo-btn" title="Use my location">Use my location</button>
    <button id="unit-toggle" title="Toggle °C / °F">°C</button>
    <button id="share-btn" title="Copy link to share">Share</button>
  </div>
  <div class="status-line" id="status-line" aria-live="polite">Loading default city…</div>

  <div class="hero" id="hero">
    <div>
      <div class="hero-loc" id="loc-name">No location selected</div>
      <div class="hero-temp" id="hero-temp">--<sup>°C</sup></div>
      <div class="hero-desc" id="hero-desc">Awaiting data…</div>
      <div class="hero-meta">
        <div>Feels like<b id="feels">--°</b></div>
        <div>Humidity<b id="humidity">--%</b></div>
        <div>Wind<b id="wind">-- km/h</b></div>
        <div>UV Index<b id="uv">--</b></div>
        <div>Sunrise<b id="sunrise">--:--</b></div>
        <div>Sunset<b id="sunset">--:--</b></div>
      </div>
    </div>
    <div class="hero-icon" id="hero-icon">⛅</div>
  </div>

  <div class="section-label">Next 24 hours</div>
  <div class="hourly-strip" id="hourly-strip"><div class="status-line">No data yet.</div></div>

  <div class="section-label">7-day outlook</div>
  <div class="daily-grid" id="daily-grid"><div class="status-line">No data yet.</div></div>

  <footer>
    Data via <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a> — free, no API key required.
  </footer>
</div>

<script>
(function(){
  "use strict";

  var WMO = {
    0:['Clear sky','☀️'], 1:['Mainly clear','🌤️'], 2:['Partly cloudy','⛅'], 3:['Overcast','☁️'],
    45:['Fog','🌫️'], 48:['Rime fog','🌫️'],
    51:['Light drizzle','🌦️'], 53:['Drizzle','🌦️'], 55:['Dense drizzle','🌧️'],
    56:['Freezing drizzle','🌧️'], 57:['Freezing drizzle','🌧️'],
    61:['Light rain','🌧️'], 63:['Rain','🌧️'], 65:['Heavy rain','🌧️'],
    66:['Freezing rain','🌧️'], 67:['Freezing rain','🌧️'],
    71:['Light snow','🌨️'], 73:['Snow','🌨️'], 75:['Heavy snow','❄️'], 77:['Snow grains','🌨️'],
    80:['Light showers','🌦️'], 81:['Showers','🌧️'], 82:['Violent showers','⛈️'],
    85:['Snow showers','🌨️'], 86:['Heavy snow showers','❄️'],
    95:['Thunderstorm','⛈️'], 96:['Thunderstorm w/ hail','⛈️'], 99:['Severe thunderstorm','⛈️']
  };
  function wmoInfo(code){ return WMO[code] || ['Unknown','🌡️']; }

  var statusEl = document.getElementById('status-line');
  var cityInput = document.getElementById('city-input');
  var UNIT = localStorage.getItem('unit') || 'C'; // 'C' or 'F'
  var unitBtn = document.getElementById('unit-toggle');

  // Keep last data for re-render when units change
  window.__lastWeatherData = null;
  window.__lastLabel = null;

  function setStatus(msg, isError){
    statusEl.textContent = msg;
    statusEl.classList.toggle('error', !!isError);
  }

  function tickClock(){
    var now = new Date();
    document.getElementById('date-line').textContent = now.toLocaleDateString(undefined, { weekday:'short', year:'numeric', month:'short', day:'numeric' });
    document.getElementById('time-line').textContent = now.toLocaleTimeString();
  }
  tickClock();
  setInterval(tickClock, 1000);

  function fetchWithTimeout(url, timeoutMs){
    var controller = new AbortController();
    var id = setTimeout(function(){ controller.abort(); }, timeoutMs || 10000);
    return fetch(url, { signal: controller.signal }).finally(function(){ clearTimeout(id); });
  }

  function geocodeCity(name){
    var url = "https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(name) + "&count=1&language=en&format=json";
    return fetchWithTimeout(url, 10000)
      .then(function(res){
        if(!res.ok) throw new Error('Geocoding service unavailable');
        return res.json();
      })
      .then(function(data){
        if(!data.results || !data.results.length) throw new Error('City not found — try a different spelling');
        var r = data.results[0];
        return { lat:r.latitude, lon:r.longitude, label:[r.name, r.admin1, r.country].filter(Boolean).join(', ') };
      });
  }

  function fetchWeather(lat, lon){
    var url = "https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon +
      "&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,uv_index" +
      "&hourly=temperature_2m,weather_code,precipitation_probability" +
      "&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset" +
      "&timezone=auto&forecast_days=7";
    return fetchWithTimeout(url, 10000).then(function(res){
      if(!res.ok) throw new Error('Forecast service unavailable');
      return res.json();
    });
  }

  function convertTemp(celsius){
    return (UNIT === 'C') ? celsius : (celsius * 9/5) + 32;
  }
  function displayNumber(celsius){
    return Math.round(convertTemp(celsius));
  }
  function updateUnitUI(){
    unitBtn.textContent = (UNIT === 'C') ? '°C' : '°F';
  }
  updateUnitUI();

  unitBtn.addEventListener('click', function(){
    UNIT = (UNIT === 'C') ? 'F' : 'C';
    localStorage.setItem('unit', UNIT);
    updateUnitUI();
    if(window.__lastWeatherData && window.__lastLabel){
      renderHero(window.__lastLabel, window.__lastWeatherData);
      renderHourly(window.__lastWeatherData);
      renderDaily(window.__lastWeatherData);
    }
  });

  function renderHero(label, data){
    document.getElementById('loc-name').textContent = label;
    var c = data.current;
    var info = wmoInfo(c.weather_code);
    document.getElementById('hero-temp').innerHTML = displayNumber(c.temperature_2m) + '<sup>°' + UNIT + '</sup>';
    document.getElementById('hero-desc').textContent = info[0];
    document.getElementById('hero-icon').textContent = info[1];
    document.getElementById('feels').textContent = displayNumber(c.apparent_temperature) + '°';
    document.getElementById('humidity').textContent = c.relative_humidity_2m + '%';
    document.getElementById('wind').textContent = Math.round(c.wind_speed_10m) + ' km/h';
    document.getElementById('uv').textContent = (c.uv_index !== undefined && c.uv_index !== null) ? c.uv_index.toFixed(1) : '--';

    // Sunrise / Sunset (daily arrays align; use first day)
    if(data.daily && data.daily.sunrise && data.daily.sunset){
      var sunrise = new Date(data.daily.sunrise[0]);
      var sunset = new Date(data.daily.sunset[0]);
      document.getElementById('sunrise').textContent = sunrise.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      document.getElementById('sunset').textContent = sunset.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }
  }

  function renderHourly(data){
    var strip = document.getElementById('hourly-strip');
    strip.innerHTML = '';
    var times = data.hourly.time;
    var nowIdx = 0;
    var now = new Date();
    for(var i=0;i<times.length;i++){ if(new Date(times[i]) >= now){ nowIdx = i; break; } }
    for(var j=nowIdx; j<nowIdx+24 && j<times.length; j++){
      var t = new Date(times[j]);
      var info = wmoInfo(data.hourly.weather_code[j]);
      var card = document.createElement('div');
      card.className = 'hour-card';
      card.innerHTML = '<div class="t">' + t.toLocaleTimeString([], {hour:'2-digit'}) + '</div>' +
        '<div class="ic">' + info[1] + '</div>' +
        '<div class="v">' + displayNumber(data.hourly.temperature_2m[j]) + '°</div>';
      strip.appendChild(card);
    }
  }

  function renderDaily(data){
    var grid = document.getElementById('daily-grid');
    grid.innerHTML = '';
    data.daily.time.forEach(function(t, i){
      var date = new Date(t);
      var info = wmoInfo(data.daily.weather_code[i]);
      var card = document.createElement('div');
      card.className = 'day-card';
      card.innerHTML = '<div class="d">' + (i===0 ? 'Today' : date.toLocaleDateString(undefined,{weekday:'short'})) + '</div>' +
        '<div class="ic" title="' + info[0] + '">' + info[1] + '</div>' +
        '<div><span class="hi">' + displayNumber(data.daily.temperature_2m_max[i]) + '°</span><span class="lo">' + displayNumber(data.daily.temperature_2m_min[i]) + '°</span></div>' +
        '<div class="rain">💧 ' + data.daily.precipitation_probability_max[i] + '%</div>';
      grid.appendChild(card);
    });
  }

  function saveLast(locationName, lat, lon, data){
    try{ localStorage.setItem('lastLocation', JSON.stringify({ locationName: locationName, lat: lat, lon: lon, ts: Date.now() })); }catch(e){}
    window.__lastWeatherData = data; window.__lastLabel = locationName;
  }

  function loadByCoords(lat, lon, label){
    setStatus('Fetching live data…');
    fetchWeather(lat, lon)
      .then(function(data){
        renderHero(label, data);
        renderHourly(data);
        renderDaily(data);
        setStatus('Updated ' + new Date().toLocaleTimeString() + ' — showing ' + label);
        saveLast(label, lat, lon, data);
      })
      .catch(function(err){
        if(err && err.name === 'AbortError') setStatus('Request timed out — please try again.', true);
        else setStatus(err && err.message ? err.message : 'Something went wrong fetching weather data.', true);
      });
  }

  function loadByCity(name){
    setStatus('Locating city…');
    geocodeCity(name)
      .then(function(loc){ loadByCoords(loc.lat, loc.lon, loc.label); })
      .catch(function(err){
        if(err && err.name === 'AbortError') setStatus('Geocoding timed out — please try again.', true);
        else setStatus(err && err.message ? err.message : 'Could not find that city.', true);
      });
  }

  document.getElementById('search-btn').addEventListener('click', function(){
    var v = cityInput.value.trim();
    if(v) loadByCity(v);
    else setStatus('Please enter a city name.', true);
  });
  cityInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ e.preventDefault(); document.getElementById('search-btn').click(); }
  });
  document.getElementById('geo-btn').addEventListener('click', function(){
    if(!navigator.geolocation){
      setStatus('Geolocation is not supported by your browser.', true);
      return;
    }
    setStatus('Requesting your location…');
    navigator.geolocation.getCurrentPosition(
      function(pos){ loadByCoords(pos.coords.latitude, pos.coords.longitude, 'Your location'); },
      function(){ setStatus('Location access denied — try searching a city instead.', true); }
    );
  });

  document.getElementById('share-btn').addEventListener('click', function(){
    if(!window.__lastLabel) return setStatus('No location to share', true);
    var q = encodeURIComponent(window.__lastLabel);
    var url = location.origin + location.pathname + '?q=' + q;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(function(){ setStatus('Link copied to clipboard'); }).catch(function(){ setStatus(url); });
    } else {
      setStatus(url);
    }
  });

  function loadLastIfAny(){
    var params = new URLSearchParams(location.search);
    if(params.has('q')){ loadByCity(params.get('q')); return; }
    var last = localStorage.getItem('lastLocation');
    if(last){
      try{
        var obj = JSON.parse(last);
        setStatus('Loading last viewed location…');
        loadByCoords(obj.lat, obj.lon, obj.locationName);
        return;
      }catch(e){}
    }
    loadByCity('Jammu');
  }

  // Initial load
  loadLastIfAny();
})();
</script>
</body>
</html>
